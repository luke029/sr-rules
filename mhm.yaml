# mhm.yaml - 最终完整版（已加大陆区域绕过）
# 日期：2026-07-15

# ==================== 全局设置 ====================
geodata-mode: false
geoip-url: ""
geosite-url: ""
mmdb-url: ""

# ==================== 代理提供者 ====================
proxy-providers:
  订阅:
    type: http
    url: "https://你的真实订阅链接（由 fx.conf 注入）"
    path: ./proxy_provider/订阅.yaml
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ==================== 策略组 ====================
proxy-groups:
  - name: PROXY
    type: select
    include-all-proxies: true
    proxies:
      - "自动选择"
      - DIRECT
      - REJECT

  - name: "自动选择"
    type: url-test
    include-all-proxies: true
    url: http://www.gstatic.com/generate_204
    interval: 60
    tolerance: 30

# ==================== DNS ====================
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: true
  use-hosts: true
  use-system-hosts: false

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://1.12.12.12/dns-query
    - https://dns.alidns.com/dns-query

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://1.1.1.1/dns-query

  nameserver-policy:
    'geosite:cn,private':
      - https://223.5.5.5/dns-query
      - https://119.29.29.29/dns-query
    'geosite:geolocation-!cn':
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw

# ==================== Sniffer ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false

  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443, 8881, 8882, 8883]
    QUIC:
      ports: [443, 8443, 8881, 8882, 8883, 20000-20300]

  force-domain:
    - '+.netflix.com'
    - '+.nflxvideo.net'

  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'

# ==================== 规则路由 ====================
