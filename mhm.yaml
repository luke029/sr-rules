  - RULE-SET,YouTube,PROXY
  - RULE-SET,Streaming,PROXY
  - RULE-SET,Apple,PROXY
  - RULE-SET,Google,PROXY
  - RULE-SET,Microsoft,PROXY
  - RULE-SET,Proxy,PROXY
  - RULE-SET,China,DIRECT   # 大陆区域绕过

  # IP规则
  - RULE-SET,AdvertisingIP,REJECT,no-resolve
  - RULE-SET,PrivateIP,DIRECT,no-resolve
  - RULE-SET,XPTVIP,PROXY,no-resolve
  - RULE-SET,AIIP,PROXY,no-resolve
  - RULE-SET,TelegramIP,PROXY,no-resolve
  - RULE-SET,SocialMediaIP,PROXY,no-resolve
  - RULE-SET,EmbyIP,PROXY,no-resolve
  - RULE-SET,NetflixIP,PROXY,no-resolve
  - RULE-SET,StreamingIP,PROXY,no-resolve
  - RULE-SET,GoogleIP,PROXY,no-resolve
  - RULE-SET,ProxyIP,PROXY,no-resolve
  - RULE-SET,ChinaIP,DIRECT,no-resolve   # 大陆IP绕过

  - MATCH,PROXY

