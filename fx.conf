# --- fx.conf 强力版（解决节点不加载）---
[General]
DISABLE_UDP_QUIC = 1
RESTART = true

DOWNLOAD_FILE = url=https://v4.gh-proxy.org/https://raw.githubusercontent.com/luke029/sr-rules/main/mhm.yaml, path=/etc/openclash/config/mhm.yaml, cron=0 6 * * *, force=true

CONFIG_FILE = /etc/openclash/config/mhm.yaml

[Overwrite]
# 合并模板
ruby_merge_hash "$CONFIG_FILE" "" "YAML.load_file('/etc/openclash/config/mhm.yaml')"

# 注入订阅
ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "订阅" "['url']" "$EN_KEY1"

# 强制更新订阅
ruby_edit "$CONFIG_FILE" "['proxy-providers']['订阅']['url']" "$EN_KEY1"