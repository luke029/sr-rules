# OpenClash 覆写规则 (fx.conf)2026.7.13
# 自定义明文 → GEOSITE → GEOIP → MATCH

[General]
CORE_TYPE = Meta
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 1
APPEND_DEFAULT_DNS = 1
APPEND_WAN_DNS = 0
STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 1
CUSTOM_FAKEIP_FILTER_MODE = blacklist
FAKEIP_RANGE = 198.18.0.1/16
ENABLE_RESPECT_RULES = 1
CUSTOM_NAME_POLICY = 1
CUSTOM_HOST = 1
CUSTOM_FALLBACK_FILTER = 1
IPV6_ENABLE = 0
IPV6_DNS = 0
EN_MODE = fake-ip-mix
DISABLE_UDP_QUIC = 1
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule
STACK_TYPE = system
INTRANET_ALLOWED = 1
BYPASS_GATEWAY_COMPATIBLE = 0
CHINA_IP_ROUTE = 1
CHINA_IP6_ROUTE = 0
CHNR_AUTO_UPDATE = 1
CHNR_UPDATE_WEEK_TIME = *
CHNR_UPDATE_DAY_TIME = 6
ENABLE_META_SNIFFER = 1
ENABLE_META_SNIFFER_CUSTOM = 1
ENABLE_META_SNIFFER_PURE_IP = 1
ENABLE_TCP_CONCURRENT = 1
FIND_PROCESS_MODE = off
GLOBAL_CLIENT_FINGERPRINT = random
ENABLE_RULE_PROXY = 0
ENABLE_CUSTOM_CLASH_RULES = 1
AUTO_SMART_SWITCH = 0
LGBM_AUTO_UPDATE = 1
LGBM_UPDATE_INTERVAL = 72
LGBM_CUSTOM_URL = https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin
ENABLE_GEOIP_DAT = 0
GEODATA_LOADER = standard
GEO_AUTO_UPDATE = 1
GEO_UPDATE_WEEK_TIME = 1
GEO_UPDATE_DAY_TIME = 5
GEOIP_AUTO_UPDATE = 0
GEOSITE_AUTO_UPDATE = 1
GEOSITE_UPDATE_WEEK_TIME = 1
GEOSITE_UPDATE_DAY_TIME = 5
SMALL_FLASH_MEMORY = 0
DISABLE_QUIC_GO_GSO = 1
DELAY_START = 0
SKIP_PROXY_ADDRESS = 1
RESTART = false

[YAML]
proxy-groups!:
  - name: PROXY
    type: select
    proxies:
      - "DMIT 自动选择"
      - DIRECT
      - REJECT
      - "DMIT xtls-reality"
      - "DMIT hysteria2"
      - "DMIT tuic"
  - name: "DMIT 自动选择"
    type: url-test
    proxies:
      - "DMIT hysteria2"
      - "DMIT tuic"
      - "DMIT xtls-reality"
    url: http://www.gstatic.com/generate_204
    interval: '60'
    tolerance: '30'

