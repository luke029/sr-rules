# --- fx.conf 强制模板版 ---
[General]
DISABLE_UDP_QUIC = 1

# 下载并强制使用模板
DOWNLOAD_FILE = url=https://raw.githubusercontent.com/luke029/sr-rules/main/mhm.yaml, path=/etc/openclash/config/mhm.yaml, cron=0 6 * * *, force=false

CONFIG_FILE = /etc/openclash/config/mhm.yaml

SUB_INFO_URL = $EN_KEY1

[Overwrite]
# 注入你的订阅链接（在这里填真实链接）
ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "订阅" "['url']" "https://你的真实订阅链接填在这里"