# --- fx.conf 最终版（[General] 基于你的 old.conf + 强制关闭 GEO）---
[General]
CORE_TYPE = Meta
DNS_PORT = 1053
ENABLE_REDIRECT_DNS = 2
ENABLE_CUSTOM_DNS = 1
APPEND_DEFAULT_DNS = 0
APPEND_WAN_DNS = 0
STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 1
CUSTOM_FAKEIP_FILTER_MODE = blacklist
FAKEIP_RANGE = 198.18.0.1/16
ENABLE_RESPECT_RULES = 1
CUSTOM_NAME_POLICY = 1
CUSTOM_HOST = 1
CUSTOM_FALLBACK_FILTER = 1
IPV6_ENABLE = 0
IPV6_DNS = 0
EN_MODE = fake-ip-mix
DISABLE_UDP_QUIC = 1
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule
STACK_TYPE = system
INTRANET_ALLOWED = 1
BYPASS_GATEWAY_COMPATIBLE = 0
CHINA_IP_ROUTE = 1
CHINA_IP6_ROUTE = 0
CHNR_AUTO_UPDATE = 0
ENABLE_META_SNIFFER = 1
ENABLE_META_SNIFFER_CUSTOM = 1
ENABLE_META_SNIFFER_PURE_IP = 1
ENABLE_TCP_CONCURRENT = 1
FIND_PROCESS_MODE = off
ENABLE_RULE_PROXY = 0
ENABLE_CUSTOM_CLASH_RULES = 1
AUTO_SMART_SWITCH = 0
LGBM_AUTO_UPDATE = 1
LGBM_UPDATE_INTERVAL = 72
LGBM_CUSTOM_URL = https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin
ENABLE_GEOIP_DAT = 0          # 强制关闭 GEOIP
GEODATA_LOADER = standard
GEO_AUTO_UPDATE = 0           # 关闭 GEO 自动更新
GEO_UPDATE_WEEK_TIME = 1
GEO_UPDATE_DAY_TIME = 5
GEOIP_AUTO_UPDATE = 0         # 关闭 GEOIP 自动更新
GEOSITE_AUTO_UPDATE = 0       # 关闭 GEOSITE 自动更新
GEOSITE_UPDATE_WEEK_TIME = 1
GEOSITE_UPDATE_DAY_TIME = 5
SMALL_FLASH_MEMORY = 0
DISABLE_QUIC_GO_GSO = 1
DELAY_START = 0
SKIP_PROXY_ADDRESS = 1
RESTART = true

[YAML]
global-client-fingerprint: random

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: true
  use-hosts: true
  use-system-hosts: false
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://1.12.12.12/dns-query
    - https://dns.alidns.com/dns-query
  
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://1.1.1.1/dns-query
  
  nameserver-policy:
    'geosite:cn,private':
      - https://223.5.5.5/dns-query
      - https://119.29.29.29/dns-query
    'geosite:geolocation-!cn':
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
  
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443, 8881, 8882, 8883]
    QUIC:
      ports: [443, 8443, 8881, 8882, 8883, 20000-20300]
  
  force-domain:
    - '+.netflix.com'
    - '+.nflxvideo.net'
  
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'

proxy-groups:
  - name: PROXY
    type: select
    include-all-proxies: true
    proxies:
      - "自动选择"
      - DIRECT
      - REJECT

  - name: "自动选择"
    type: url-test
    include-all-proxies: true
    url: http://www.gstatic.com/generate_204
    interval: 60
    tolerance: 30

# ==================== 规则路由 ====================
rules:
  # 你的特殊规则
  - DOMAIN-SUFFIX,openspeech.bytedance.com,DIRECT
