  - RULE-SET,AI,PROXY
  - DOMAIN-KEYWORD,speedtest,PROXY
  - RULE-SET,Speedtest,PROXY
  - RULE-SET,Twitter,PROXY
  - RULE-SET,Telegram,PROXY
  - RULE-SET,SocialMedia,PROXY
  - RULE-SET,NewsMedia,PROXY
  - RULE-SET,Games,PROXY
