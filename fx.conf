# OpenClash 覆写规则 (fx.conf)
# 优化版 - 2026-07-14
# 主力 Hy2 + Fake-IP-Mix + 完整 DNS + Sniffer

global-client-fingerprint: random

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: true
  use-hosts: true
  use-system-hosts: false
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://1.12.12.12/dns-query
    - https://dns.alidns.com/dns-query
  
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
    - https://dns.alidns.com/dns-query
  
  nameserver-policy:
    'geosite:cn,private':
      - https://223.5.5.5/dns-query
      - https://223.6.6.6/dns-query
      - https://1.12.12.12/dns-query
    'geosite:geolocation-!cn':
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
  
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://223.5.5.5/dns-query
  
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
  
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.localhost'
    - '*.local'
    - '*.home.arpa'
    - '*.direct'
    - '*.test'
    - 'detectportal.firefox.com'
    - 'network-test.debian.org'
    - '+.push.apple.com'
    - '+.market.xiaomi.com'
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - 'time.apple.com'
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - '*.srv.nintendo.net'
    - 'stun.*.*'
    - 'xbox.*.microsoft.com'
    - '*.nflxvideo.net'
    - 'music.163.com'
    - '+.qq.com'
    - '+.tencent.com'

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443, 8881, 8882, 8883]
    QUIC:
      ports: [443, 8443, 8881, 8882, 8883, 20000-20300]
  
  force-domain:
    - '+.netflix.com'
    - '+.nflxvideo.net'
  
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'

proxy-groups:
  - name: PROXY
    type: select
    include-all-proxies: true
    proxies:
      - "自动选择"
      - DIRECT
      - REJECT

  - name: "自动选择"
    type: url-test
    include-all-proxies: true
    url: http://www.gstatic.com/generate_204
    interval: 60
    tolerance: 30

