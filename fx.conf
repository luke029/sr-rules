# OpenClash 覆写规则 (fx.conf)
# 最后修改: 2026-07-13 17:00 CST
# 全部配置由本文件控制，不受 LuCI 面板开关影响
# Fake-IP + TUN(fake-ip-mix) | DNS 全 DoH | respect-rules 防泄露

[General]
CORE_TYPE = Meta
DNS_PORT = 1053
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 0
APPEND_DEFAULT_DNS = 0
APPEND_WAN_DNS = 0
STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 1
CUSTOM_FAKEIP_FILTER_MODE = blacklist
FAKEIP_RANGE = 198.18.0.1/16
ENABLE_RESPECT_RULES = 1
CUSTOM_NAME_POLICY = 1
CUSTOM_HOST = 1
CUSTOM_FALLBACK_FILTER = 1
IPV6_ENABLE = 0
IPV6_DNS = 0
EN_MODE = fake-ip-mix
DISABLE_UDP_QUIC = 1
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule
STACK_TYPE = system
INTRANET_ALLOWED = 1
BYPASS_GATEWAY_COMPATIBLE = 0
CHINA_IP_ROUTE = 1
CHINA_IP6_ROUTE = 0
CHNR_AUTO_UPDATE = 1
CHNR_UPDATE_WEEK_TIME = *
CHNR_UPDATE_DAY_TIME = 6
ENABLE_META_SNIFFER = 0
ENABLE_META_SNIFFER_CUSTOM = 0
ENABLE_META_SNIFFER_PURE_IP = 0
ENABLE_TCP_CONCURRENT = 1
FIND_PROCESS_MODE = off
ENABLE_RULE_PROXY = 0
ENABLE_CUSTOM_CLASH_RULES = 1
AUTO_SMART_SWITCH = 0
LGBM_AUTO_UPDATE = 1
LGBM_UPDATE_INTERVAL = 72
LGBM_CUSTOM_URL = https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin
ENABLE_GEOIP_DAT = 0
GEODATA_LOADER = standard
GEO_AUTO_UPDATE = 1
GEO_UPDATE_WEEK_TIME = 1
GEO_UPDATE_DAY_TIME = 5
GEOIP_AUTO_UPDATE = 0
GEOSITE_AUTO_UPDATE = 1
GEOSITE_UPDATE_WEEK_TIME = 1
GEOSITE_UPDATE_DAY_TIME = 5
SMALL_FLASH_MEMORY = 0
DISABLE_QUIC_GO_GSO = 1
DELAY_START = 0
SKIP_PROXY_ADDRESS = 1
RESTART = false

[YAML]
global-client-fingerprint: random

dns!:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: true
  use-hosts: true
  use-system-hosts: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  nameserver-policy:
    'geosite:cn,private':
      - https://223.5.5.5/dns-query
      - https://223.6.6.6/dns-query
    'geosite:geolocation-!cn':
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.localhost'
    - '*.local'
    - '*.home.arpa'
    - '*.direct'
    - '*.test'
    - 'detectportal.firefox.com'
    - 'network-test.debian.org'
    - '+.push.apple.com'
    - '+.market.xiaomi.com'
    - '+.localhost.ptlogin2.qq.com'
    - '+.localhost.sec.qq.com'
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - 'time.apple.com'
    - 'time-ios.apple.com'
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - '*.srv.nintendo.net'
    - '*.stun.playstation.net'
    - 'stun.l.google.com'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - 'stun.*.*.*.*'
    - 'xbox.*.microsoft.com'
    - '*.*.xboxlive.com'
    - '*.battlenet.com.cn'
    - '*.wargaming.net'
    - '*.nflxvideo.net'
    - '*.blzstatic.cn'
    - '*.cmpassport.com'
    - 'na.b.g-tun.com'
    - 'music.163.com'
    - '*.music.163.com'
    - '+.qq.com'
    - '+.tencent.com'
    - '*.kuwo.cn'
    - '*.xiami.com'
    - '*.music.migu.cn'
    - 'heart.skland.com'
    - 'o40631mlp4.qnssnl.com'

sniffer!:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - '+.netflix.com'
    - '+.nflxvideo.net'
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'

proxy-groups!:
  - name: PROXY
    type: select
    proxies:
      - "DMIT 自动选择"
      - DIRECT
      - REJECT
      - "DMIT xtls-reality"
      - "DMIT hysteria2"
      - "DMIT tuic"
  - name: "DMIT 自动选择"
    type: url-test
    proxies:
      - "DMIT hysteria2"
      - "DMIT tuic"
      - "DMIT xtls-reality"
    url: http://www.gstatic.com/generate_204
    interval: '60'
    tolerance: '30'

rules!:
