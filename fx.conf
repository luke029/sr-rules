
--- fx.conf 最终推荐版（自动合并订阅）---
[General] 
DISABLE_UDP_QUIC = 1

下载基础模板
DOWNLOAD_FILE = url=https://gh-proxy.org/https://raw.githubusercontent.com/luke029/sr-rules/main/mhm.yaml, path=/etc/openclash/config/mhm_base.yaml, cron=0 6 * * *, force=false

[Overwrite]
关键：把模板合并到当前配置（保留面板订阅）
ruby_merge_hash "$CONFIG_FILE" "" "YAML.load_file('/etc/openclash/config/mhm_base.yaml')"

动态注入订阅（如果需要指定 provider 名字）
ruby_map_edit "$CONFIG_FILE" "['proxy-providers']" "订阅" "['url']" "$EN_KEY1"





