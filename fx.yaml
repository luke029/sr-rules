# ================== OpenClash 远程覆写配置 ==================
# 基于你的 DMIT 节点 + sr-rules 仓库优化
# GitHub 远程使用：raw.githubusercontent.com/你的用户名/仓库/main/openclash_override.yaml

mode: rule
log-level: debug
ipv6: false
allow-lan: true
bind-address: "0.0.0.0"

# TUN 模式（推荐开启）
tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"
  auto-route: true
  auto-detect-interface: true

# ================== DNS（高防泄露版） ==================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.apple.com"
    - "+.icloud.com"
    - "+.icloud-content.com"
    - "+.icloud.com.cn"
    - "+.me.com"
    - "+.itunes.com"
    - "+.microsoft.com"
    - "+.windows.net"
    - "+.microsoftonline.com"
    - "+.office.com"
    - "+.office365.com"
    - "+.cdn.*"
    - "+.wsdvs.com"
    - "+.bilibili.com"
    - "+.163.com"
    - "+.douyin.com"
    - "+.taobao.com"
    - "+.jd.com"
    - "+.qq.com"
    - "+.weixin.qq.com"
    - "+.wechat.com"
    - "+.work.weixin.qq.com"
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.hicloud.com"
    - "+.vivo.com"
    - "+.oppo.com"
    - "+.local"
    - "+.localhost"
    - "+.lan"
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    "geosite:cn":
      - https://223.5.5.5/dns-query
      - https://223.6.6.6/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://1.0.0.1/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  respect-rules: false
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query
    - https://119.29.29.29/dns-query

# ================== 代理组（适配你的 DMIT 节点） ==================
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - "DMIT 自动选择"
      - DIRECT
      - REJECT
      - "DMIT xtls-reality"
      - "DMIT hysteria2"
      - "DMIT tuic"

  - name: "DMIT 自动选择"
    type: url-test
    proxies:
      - "DMIT hysteria2"
      - "DMIT tuic"
      - "DMIT xtls-reality"
    url: http://www.gstatic.com/generate_204
    interval: '60'
    tolerance: '30'

# ===== 规则集提供者（你的 sr-rules 仓库） =====
rule-providers:
  Apple:
    type: http
    behavior: classical
    path: ./rule_provider/apple.yaml
    url: "https://cdn.jsdelivr.net/gh/luke029/sr-rules@main/Apple.list"
    interval: 86400
  # （以下全部保留你提供的 rule-providers）
  AppleProxy:
