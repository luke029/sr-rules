# 生成日期: 2026-06-27
# ===== 端口设置 =====
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893

# 允许外部访问
bind-address: "0.0.0.0"

# ===== 运行模式 =====
mode: rule
log-level: info
ipv6: false
allow-lan: true

# ===== 外部控制 (OpenClash Web UI) =====

# ===== DNS 配置 (从 Shadowrocket 迁移) =====
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.apple.com"
    - "+.icloud.com"
    - "+.icloud-content.com"
    - "+.icloud.com.cn"
    - "+.me.com"
    - "+.itunes.com"
    - "+.microsoft.com"
    - "+.windows.net"
    - "+.microsoftonline.com"
    - "+.office.com"
    - "+.office365.com"
    - "+.cdn.*"
    - "+.wsdvs.com"
    - "+.bilibili.com"
    - "+.163.com"
    - "+.douyin.com"
    - "+.taobao.com"
    - "+.jd.com"
    - "+.qq.com"
    - "+.weixin.qq.com"
    - "+.wechat.com"
    - "+.work.weixin.qq.com"
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.hicloud.com"
    - "+.vivo.com"
    - "+.oppo.com"
    - "+.local"
    - "+.localhost"
    - "+.lan"
  nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
    - https://8.8.8.8/dns-query
    - https://8.8.4.4/dns-query
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://119.29.29.29/dns-query
    - https://doh.pub/dns-query
    - tls://doh.pub
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

# ===== 代理节点 (订阅) =====
proxy-providers:
  My_Subscription:
    type: http
    path: ./proxy_provider/my_sub.yaml
    url: "https://你的订阅链接.com/proxies"  # ⚠️ 请替换为你的真实订阅链接
    interval: 86400
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ===== 策略组 =====
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - "\U0001F680 自动选择"
      - DIRECT
      - REJECT
    use:
      - My_Subscription

  - name: "\U0001F680 自动选择"
    type: url-test
    proxies:
      - DIRECT
    use:
      - My_Subscription
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

