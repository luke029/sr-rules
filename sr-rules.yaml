proxies:
- name: "\U0001F1EF\U0001F1F5 日本 hysteria2"
  type: hysteria2
  server: 0.0.0.0
  port: 8882
  password: **************************
  up: 200 Mbps
  down: 1000 Mbps
  skip-cert-verify: true
  sni: addons.mozilla.org
- name: "\U0001F1EF\U0001F1F5 日本 tuic"
  type: tuic
  server: 0.0.0.0
  port: 8883
  uuid: **************************
  password: **************************
  udp-relay-mode: native
  congestion-controller: bbr
  alpn:
  - h3
  reduce-rtt: false
  request-timeout: 8000
  skip-cert-verify: true
  sni: addons.mozilla.org
- name: "\U0001F1ED\U0001F1F0 香港 hysteria2"
  type: hysteria2
  server: 0.0.0.0
  port: 8882
  password: **************************
  up: 100 Mbps
  down: 500 Mbps
  skip-cert-verify: true
  sni: addons.mozilla.org
- name: "\U0001F1ED\U0001F1F0 香港 tuic"
