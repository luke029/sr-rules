  alpn:
  - h3
  reduce-rtt: false
  request-timeout: 8000
  skip-cert-verify: true
  sni: addons.mozilla.org
proxy-groups:
- name: PROXY
  type: select
  proxies:
  - "\U0001F1EF\U0001F1F5 日本 自动选择"
  - "\U0001F1ED\U0001F1F0 香港 自动选择"
  - DIRECT
  - REJECT
  - "\U0001F1EF\U0001F1F5 日本 hysteria2"
  - "\U0001F1EF\U0001F1F5 日本 tuic"
  - "\U0001F1ED\U0001F1F0 香港 hysteria2"
  - "\U0001F1ED\U0001F1F0 香港 tuic"
- name: "\U0001F1EF\U0001F1F5 日本 自动选择"
  type: url-test
  proxies:
  - "\U0001F1EF\U0001F1F5 日本 hysteria2"
  - "\U0001F1EF\U0001F1F5 日本 tuic"
  url: http://www.gstatic.com/generate_204
  interval: '300'
  tolerance: '50'
- name: "\U0001F1ED\U0001F1F0 香港 自动选择"
  type: url-test
  proxies:
  - "\U0001F1ED\U0001F1F0 香港 hysteria2"
